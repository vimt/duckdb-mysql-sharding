# MySQL Sharding Hosts Configuration
# One connection string per line (same format as duckdb-mysql)
# Lines starting with # are comments, empty lines are ignored
#
# Usage in DuckDB:
#   ATTACH '/path/to/this/file.conf' AS my_sharding (TYPE mysql_sharding);
#   SELECT * FROM my_sharding.my_db.my_table;

host=192.168.1.1 user=root password=secret port=3306
host=192.168.1.2 user=root password=secret port=3306
